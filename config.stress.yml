# Blossom Server — Stress Test Configuration
#
# Used by docker-compose.stress.yml. NOT for production use.
#
# Key differences from production:
#   - upload.requireAuth: false  — k6 scripts don't generate Nostr signed events
#   - upload.workers: 2          — pinned pool size for deterministic 503 behaviour
#   - upload.maxSize: 10 MB      — tighter ceiling to saturate workers faster
#   - list.enabled: true         — expose list endpoint for list-stress scenarios

publicDomain: ""

database:
  path: data/sqlite.db

port: 3000

storage:
  backend: local
  local:
    dir: ./data/blobs
  removeWhenNoOwners: false
  rules: []

upload:
  enabled: true
  requireAuth: false
  # Pin to 2 workers so pool exhaustion (503) is hit predictably.
  # Override navigator.hardwareConcurrency regardless of host CPU count.
  workers: 2
  # 10 MB — small enough that concurrent large uploads fill workers quickly.
  maxSize: 10485760
  allowedTypes: []

list:
  enabled: true
  requireAuth: false
  allowListOthers: true

delete:
  requireAuth: false
