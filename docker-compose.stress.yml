# Blossom Server — Stress Test Compose Override
#
# Usage (always layered on top of docker-compose.yml):
#
#   # Run the default scenario (upload-concurrent):
#   docker compose -f docker-compose.yml -f docker-compose.stress.yml up --build --abort-on-container-exit
#
#   # Run a specific script:
#   docker compose -f docker-compose.yml -f docker-compose.stress.yml run --rm k6 run /scripts/upload-flood.js
#   docker compose -f docker-compose.yml -f docker-compose.stress.yml run --rm k6 run /scripts/upload-large.js
#
#   # Tear down and remove volumes when done:
#   docker compose -f docker-compose.yml -f docker-compose.stress.yml down -v
#
# What this override does:
#   - Replaces the config mount with config.stress.yml (no auth, pinned workers)
#   - Applies 2 CPU / 512 MB resource limits to the blossom service
#   - Adds a k6 load generator that waits for blossom to be healthy, then fires

volumes:
  stress-data: {}

services:
  blossom:
    # Override the named-volume and config mounts for the stress run.
    # Use a dedicated stress-data volume so stress runs don't pollute
    # the production data volume.
    volumes:
      - stress-data:/app/data
      - ./config.stress.yml:/app/config.yml:ro
    # Do NOT restart during stress tests — if it dies, we want to know.
    restart: "no"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M

  k6:
    image: grafana/k6:latest
    # Mount the stress scripts directory into the container
    volumes:
      - ./tests/stress:/scripts:ro
    # k6 needs to reach the blossom service by name on the compose network
    environment:
      - TARGET_URL=http://blossom:3000
    depends_on:
      blossom:
        condition: service_healthy
    # Default command runs the concurrent upload scenario.
    # Override with: docker compose ... run k6 run /scripts/upload-flood.js
    command: run /scripts/upload-concurrent.js
    # k6 exits non-zero when thresholds fail — propagate that to compose.
    restart: "no"
