# Blossom Server Configuration
#
# Environment Variable Support:
#   Use "${VAR_NAME}" anywhere in this file to substitute an env var at startup.
#   Example: accessKey: "${S3_ACCESS_KEY}"
#   If the env var is not set, the literal string "${VAR_NAME}" is kept.

# Override the domain used in the "url" field of blob descriptors.
# Defaults to the Host header of the incoming HTTP request.
publicDomain: ""

database:
  # Path to the local SQLite file.
  # Ignored when "url" is set.
  path: data/sqlite.db

  # Remote libSQL / Turso URL. When set, each upload worker opens its own
  # direct connection — no MessageChannel bridge needed.
  # Use "libsql://your-db.turso.io" for Turso cloud, or
  # "http://localhost:8080" for a local sqld container:
  #   docker run -p 8080:8080 ghcr.io/tursodatabase/libsql-server:latest
  # url: libsql://your-db.turso.io

  # Auth token for Turso cloud. Not required for a local sqld container.
  # authToken: "${TURSO_AUTH_TOKEN}"

# Deprecated: use the "database" section above instead.
# databasePath: data/sqlite.db

# HTTP port to listen on.
port: 3000

storage:
  # Storage backend: "local" or "s3"
  backend: local

  local:
    dir: ./data/blobs

  # S3-compatible object storage
  # s3:
  #   endpoint: https://s3.amazonaws.com
  #   bucket: my-blossom-bucket
  #   accessKey: "${S3_ACCESS_KEY}"
  #   secretKey: "${S3_SECRET_KEY}"
  #   region: us-east-1
  #   # If set, GET /:sha256 redirects to this URL prefix instead of proxying.
  #   # The blob's sha256 + extension is appended automatically.
  #   publicURL: https://my-bucket.s3.amazonaws.com/

  # Remove blobs with no owners immediately (rather than waiting for expiry rules).
  removeWhenNoOwners: false

  # Expiry rules — checked in order; first match wins for the blob's type.
  # Blobs whose last-access timestamp exceeds the expiration are pruned.
  # "type" supports glob wildcards: "image/*", "*"
  # "expiration" is a human-readable duration: "7 days", "1 month", "24 hours"
  # "pubkeys" (optional) restricts the rule to specific uploader pubkeys.
  rules:
    - type: "image/*"
      expiration: 1 month
    - type: "video/*"
      expiration: 1 week
    - type: "*"
      expiration: 1 week

upload:
  # Enable the PUT /upload endpoint (BUD-02).
  enabled: true

  # Require a valid BUD-11 Nostr auth token for uploads.
  requireAuth: true

  # Maximum blob size in bytes. Enforced from the Content-Length header
  # BEFORE any body bytes are read. Requests without Content-Length
  # receive 411 Length Required.
  maxSize: 2147483648 # 2 GB

  # Number of upload worker threads.
  # 0 = auto (navigator.hardwareConcurrency — one per CPU core).
  # Each worker handles multiple concurrent uploads (see maxJobsPerWorker).
  # When all workers are at capacity, new uploads receive 503 Service Unavailable.
  # There is no queue: rejection is fast (~6ms) and body bytes are never read.
  workers: 0

  # Maximum number of concurrent upload jobs a single worker will accept.
  # Workers interleave jobs on their event loop during I/O, so a single slow
  # upload does not monopolise a worker slot. Raise this if you expect many
  # simultaneous slow or small uploads; lower it if uploads are large and
  # CPU-bound (hashing dominates).
  maxJobsPerWorker: 4

  # How often (in milliseconds) each worker reports its aggregate throughput
  # to the pool. The pool uses this to route new uploads to the worker
  # currently handling the least I/O load (lowest bytes/sec).
  # Lower values = more responsive routing; higher values = less overhead.
  throughputWindowMs: 1000

  # Allowed MIME types. Empty list = all types accepted.
  # Example: ["image/jpeg", "image/png", "image/webp", "video/mp4"]
  allowedTypes: []

list:
  # Enable the GET /list/:pubkey endpoint (BUD-02).
  # This endpoint is optional and unrecommended per the BUD-02 spec.
  enabled: false

  # Require a valid BUD-11 auth token to list blobs.
  requireAuth: false

  # Allow listing blobs uploaded by other pubkeys.
  allowListOthers: true

delete:
  # Require a valid BUD-11 auth token to delete blobs.
  requireAuth: true

mirror:
  # Enable the PUT /mirror endpoint (BUD-04).
  enabled: true

  # Require a valid BUD-11 Nostr auth token for mirroring.
  requireAuth: true

  # Timeout in milliseconds for the outbound fetch to the origin server.
  # 0 = no timeout (not recommended in production).
  fetchTimeout: 30000

media:
  # Enable the PUT /media endpoint (BUD-05).
  # Clients upload an image or video; the server optimises/transcodes it,
  # stores the optimised derivative, and returns its hash and URL.
  # Requires ffmpeg to be installed on the host (for video transcoding).
  enabled: true

  # Require a valid BUD-11 Nostr auth token with t="media" for media uploads.
  requireAuth: true

  # Maximum input file size in bytes before reading the body.
  maxSize: 524288000 # 500 MB

  image:
    # Output quality 0–100 (default 90).
    quality: 90

    # Produce progressive JPEG / interlaced PNG for better streaming on slow
    # connections. Has no effect when outputFormat is "webp". (default true)
    progressive: true

    # Maximum output width in pixels. Images wider than this are scaled down
    # while preserving aspect ratio. (default 1920)
    maxWidth: 1920

    # Maximum output height in pixels. (default 1080)
    maxHeight: 1080

    # Output image format: "webp" | "jpeg" | "png" (default "webp")
    outputFormat: "webp"

    # Preserve aspect ratio when resizing. (default true)
    # Setting this to false stretches the image to exactly maxWidth×maxHeight.
    maintainAspectRatio: true

    # Keep EXIF metadata in the output file. (default false)
    # When false, all EXIF data is stripped (recommended for privacy).
    keepExif: false

    # Maximum frame rate for animated GIF output.
    # Frames that would exceed this rate are dropped. (default 30)
    fps: 30

  video:
    # Output quality 0–100 mapped to a CRF value.
    # quality=100 → CRF=0 (lossless), quality=0 → CRF=51 (worst). (default 90)
    quality: 90

    # Maximum output height in pixels. Width is scaled to preserve aspect ratio.
    # Uses ffmpeg's fit-inside scaling: ?x<maxHeight>. (default 1080)
    maxHeight: 1080

    # Maximum output frame rate. Frames above this threshold are dropped.
    # The source FPS is probed via ffprobe and clamped to this value. (default 30)
    maxFps: 30

    # Output container format: "mp4" | "webm" | "mkv" (default "mp4")
    # mp4 is the most widely compatible; webm is preferred for web delivery.
    format: "mp4"

    # Audio codec. Must be compatible with the chosen format.
    #   mp4 / mkv: "aac" (default), "mp3"
    #   webm:      "opus" (default for webm), "vorbis"
    audioCodec: "aac"

    # Video codec. Must be compatible with the chosen format.
    #   mp4 / mkv: "libx264" (default), "libx265"
    #   webm:      "vp9" (default for webm), "vp8"
    videoCodec: "libx264"

landing:
  # Enable the SSR landing page at GET /.
  enabled: false

  # Page title shown in <title> and <h1>.
  title: "Blossom Server"
