volumes:
  data: {}

services:
  blossom:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Named volume for SQLite DB and blob storage
      - data:/app/data
      # Host-mounted config (read-only). Copy config.example.yml → config.yml to start.
      - ./config.yml:/app/config.yml:ro
    restart: unless-stopped
    healthcheck:
      # Lightweight TCP probe — avoids needing curl/wget in the alpine image.
      # Deno's HTTP server is ready when it accepts connections on port 3000.
      test: [
        "CMD-SHELL",
        "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1",
      ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
